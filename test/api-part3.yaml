paths:
  /health:
    get:
      summary: 서버 상태 확인 (기본)
      operationId: healthCheck
      tags: [Health]
      security: []
      responses:
        '200':
          description: 서버 정상
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  timestamp: { type: string, format: date-time }

  /api/health:
    get:
      summary: API 서버 상태 확인 (상세)
      operationId: apiHealthCheck
      tags: [Health]
      security: []
      responses:
        '200':
          description: 서버 및 DB 연결 상태
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  db: { type: string }
                  uptime: { type: number }

  /api/menu-settings:
    get:
      summary: 메뉴 설정 조회
      operationId: getMenuSettings
      tags: [Settings]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 메뉴 설정 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings: { type: object }
        '401':
          description: 인증 필요
    post:
      summary: 메뉴 설정 저장 (관리자 전용)
      operationId: saveMenuSettings
      tags: [Settings]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settings]
              properties:
                settings:
                  type: object
                  description: page_id 키별 is_enabled, sort_order 설정
                  additionalProperties:
                    type: object
                    properties:
                      is_enabled: { type: boolean }
                      sort_order: { type: integer }
      responses:
        '200':
          description: 저장 성공
        '401':
          description: 인증 필요
        '403':
          description: 관리자 권한 필요

  /api/rbac/roles:
    get:
      summary: 역할 목록 조회
      operationId: getRbacRoles
      tags: [Settings]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 역할 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        description: { type: string }
        '401':
          description: 인증 필요
    post:
      summary: 역할 생성
      operationId: createRbacRole
      tags: [Settings]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                permissions: { type: array, items: { type: string } }
      responses:
        '200':
          description: 역할 생성 성공
        '401':
          description: 인증 필요

  /api/rbac/permissions:
    get:
      summary: 전체 권한 목록 조회
      operationId: getRbacPermissions
      tags: [Settings]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 권한 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      type: object
                      properties:
                        resource: { type: string }
                        action: { type: string }
        '401':
          description: 인증 필요

  /api/rbac/user-permissions:
    get:
      summary: 사용자별 권한 조회
      operationId: getRbacUserPermissions
      tags: [Settings]
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: 사용자 권한
        '401':
          description: 인증 필요

  /api/rbac/check:
    post:
      summary: 권한 확인
      operationId: checkRbacPermission
      tags: [Settings]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resource: { type: string }
                action: { type: string }
      responses:
        '200':
          description: 권한 확인 결과
        '401':
          description: 인증 필요

  /api/audit-log:
    get:
      summary: 감사 로그 조회 (관리자 전용)
      operationId: getAuditLog
      tags: [AuditLog]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: user
          in: query
          schema: { type: string }
          description: 사용자 이름 필터
        - name: action
          in: query
          schema: { type: string }
          description: 액션 필터
        - name: resource
          in: query
          schema: { type: string }
          description: 리소스 필터
        - name: start
          in: query
          schema: { type: string, format: date }
          description: 시작일
        - name: end
          in: query
          schema: { type: string, format: date }
          description: 종료일
        - name: q
          in: query
          schema: { type: string }
          description: 검색어
      responses:
        '200':
          description: 감사 로그 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        user_name: { type: string }
                        action: { type: string }
                        resource: { type: string }
                        detail: { type: string }
                        created_at: { type: string, format: date-time }
                  total: { type: integer }
        '401':
          description: 인증 필요
        '403':
          description: 관리자 권한 필요

  /api/audit-log/stats:
    get:
      summary: 감사 로그 통계
      operationId: getAuditLogStats
      tags: [AuditLog]
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 7 }
      responses:
        '200':
          description: 감사 로그 통계
        '401':
          description: 인증 필요
        '403':
          description: 관리자 권한 필요

  /api/audit-log/actions:
    get:
      summary: 감사 로그 액션 유형 목록
      operationId: getAuditLogActions
      tags: [AuditLog]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 액션 유형 목록
        '401':
          description: 인증 필요

  /api/error-logs:
    get:
      summary: 에러 로그 조회 (관리자 전용)
      operationId: getErrorLogs
      tags: [AuditLog]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: level
          in: query
          schema: { type: string, enum: [error, warn, info] }
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: 에러 로그 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        level: { type: string }
                        message: { type: string }
                        stack: { type: string }
                        created_at: { type: string, format: date-time }
                  total: { type: integer }
        '401':
          description: 인증 필요
        '403':
          description: 관리자 권한 필요

  /api/notes:
    get:
      summary: 노트 목록 조회
      operationId: getNotes
      tags: [Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: vendor_id
          in: query
          schema: { type: integer }
        - name: note_type
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: 노트 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  notes:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        title: { type: string }
                        content: { type: string }
                        note_type: { type: string }
                        vendor_id: { type: integer }
                        created_at: { type: string, format: date-time }
        '401':
          description: 인증 필요
    post:
      summary: 노트 생성
      operationId: createNote
      tags: [Notes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title: { type: string }
                content: { type: string }
                note_type: { type: string }
                vendor_id: { type: integer }
                tags: { type: array, items: { type: string } }
      responses:
        '200':
          description: 노트 생성 성공
        '400':
          description: 잘못된 요청
        '401':
          description: 인증 필요

  /api/notes/{id}:
    get:
      summary: 노트 상세 조회
      operationId: getNoteById
      tags: [Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 노트 상세
        '401':
          description: 인증 필요
        '404':
          description: 노트를 찾을 수 없음
    put:
      summary: 노트 수정
      operationId: updateNote
      tags: [Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                content: { type: string }
                note_type: { type: string }
                vendor_id: { type: integer }
                tags: { type: array, items: { type: string } }
      responses:
        '200':
          description: 수정 성공
        '401':
          description: 인증 필요
        '404':
          description: 노트를 찾을 수 없음
    delete:
      summary: 노트 삭제
      operationId: deleteNote
      tags: [Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 삭제 성공
        '401':
          description: 인증 필요
        '404':
          description: 노트를 찾을 수 없음

  /api/notes/{id}/comments:
    get:
      summary: 노트 댓글 목록 조회
      operationId: getNoteComments
      tags: [Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 댓글 목록
        '401':
          description: 인증 필요
    post:
      summary: 노트 댓글 작성
      operationId: createNoteComment
      tags: [Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        '200':
          description: 댓글 작성 성공
        '401':
          description: 인증 필요

  /api/note-comments/{id}:
    delete:
      summary: 노트 댓글 삭제
      operationId: deleteNoteComment
      tags: [Notes]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 삭제 성공
        '401':
          description: 인증 필요
        '404':
          description: 댓글을 찾을 수 없음

  /api/tasks:
    get:
      summary: 업무 목록 조회
      operationId: getTasks
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [open, in_progress, done, cancelled] }
        - name: category
          in: query
          schema: { type: string }
        - name: assignee
          in: query
          schema: { type: integer }
          description: 담당자 user_id
        - name: priority
          in: query
          schema: { type: string, enum: [low, medium, high, urgent] }
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: 업무 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        title: { type: string }
                        status: { type: string }
                        priority: { type: string }
                        assignee_id: { type: integer }
                        due_date: { type: string, format: date }
        '401':
          description: 인증 필요
    post:
      summary: 업무 생성
      operationId: createTask
      tags: [Tasks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                category: { type: string }
                priority: { type: string, enum: [low, medium, high, urgent] }
                assignee_id: { type: integer }
                due_date: { type: string, format: date }
                template_id: { type: integer }
      responses:
        '200':
          description: 업무 생성 성공
        '400':
          description: 잘못된 요청
        '401':
          description: 인증 필요

