                title: { type: string }
                description: { type: string }
                status: { type: string }
                priority: { type: string }
                assignee_id: { type: integer }
                due_date: { type: string, format: date }
      responses:
        '200':
          description: 수정 성공
        '401':
          description: 인증 필요
        '404':
          description: 업무를 찾을 수 없음
    delete:
      summary: 업무 삭제
      operationId: deleteTask
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
