    tags: [매출관리]
    summary: 수주 등록
    operationId: createSalesOrder
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [customer, orderDate, items]
            properties:
              customer: { type: string }
              orderDate: { type: string, format: date }
              deliveryDate: { type: string, format: date }
              items:
                type: array
                items:
                  type: object
                  properties:
                    productCode: { type: string }
                    qty: { type: integer }
                    unitPrice: { type: number }
              memo: { type: string }
    responses:
      '200':
        description: 생성 완료
      '401':
        description: 인증 필요

