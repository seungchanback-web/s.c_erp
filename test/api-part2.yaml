/api/sales/kpi:
  get:
    tags: [매출관리]
    summary: 매출 KPI 조회
    operationId: getSalesKpi
    security:
      - bearerAuth: []
    parameters:
      - name: refresh
        in: query
        schema:
          type: string
          enum: ['1']
        description: '1이면 캐시 무시하고 재조회'
    responses:
      '200':
        description: 성공
        content:
          application/json:
            schema:
              type: object
              properties:
                ok: { type: boolean }
                data:
                  type: object
                  properties:
                    today: { type: number }
                    yesterday: { type: number }
                    thisMonth: { type: number }
                    lastMonth: { type: number }
                    thisYear: { type: number }
                    lastYear: { type: number }
      '401':
        description: 인증 필요

