          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [PurchaseOrders]
      summary: 발주 상태 변경 (발송 시 이메일·Google Sheet 자동 처리)
