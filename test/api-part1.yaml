            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    shipment_date:
                      type: string
                    bl_number:
                      type: string
                    ship_date:
                      type: string
                    eta_date:
                      type: string
                    status:
                      type: string
                    total_boxes:
                      type: integer
                    total_items:
                      type: integer
                    po_items:
                      type: array
                      items:
                        type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/china-shipment-link:
    post:
      tags: [Procurement]
      summary: 중국 합선적에 여러 PO 연결 (PO 상태를 shipped로 자동 변경)
      operationId: postProcurementChinaShipmentLink
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shipment_id, po_items]
              properties:
                shipment_id:
                  type: integer
                po_items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [po_id, product_code, shipped_qty]
                    properties:
                      po_id:
                        type: integer
                      po_item_id:
                        type: integer
                      product_code:
                        type: string
                      product_name:
                        type: string
                      shipped_qty:
                        type: integer
                      notes:
                        type: string
      responses:
        '200':
          description: 연결 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  linked:
                    type: integer
                  shipment_id:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/pipeline:
    get:
      tags: [Procurement]
      summary: 생산지별 워크플로우 단계 현황
      operationId: getProcurementPipeline
      security:
        - bearerAuth: []
      parameters:
        - name: origin
          in: query
          required: false
          schema:
            type: string
            enum: ["한국", "중국", "더기프트"]
          description: "생산지 (미지정 시 전체)"
      responses:
        '200':
          description: 파이프라인 현황 (stages, pos, counts 포함)
