            application/json:
              schema:
                type: object
                properties:
                  stages:
                    type: array
                    items:
                      type: string
                  pos:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  counts:
                    type: object
                    additionalProperties:
                      type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/update-stage:
    post:
      tags: [Procurement]
      summary: PO 파이프라인 단계 업데이트
      operationId: postProcurementUpdateStage
      security:
        - bearerAuth: []
      requestBody:
        required: true
