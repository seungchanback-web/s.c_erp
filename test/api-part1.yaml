                  type: string
      responses:
        '200':
          description: 단계 업데이트 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/korea-detail/{poId}:
    get:
      tags: [Procurement]
      summary: 한국 PO 상세 (2단계 flow, 거래명세서, 활동 로그 포함)
