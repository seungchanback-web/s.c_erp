                      description: "납기 준수율 (%)"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════════════════════════════════════════════════════════════
  #  AUTO ORDER (자동발주 관리)
  # ═══════════════════════════════════════════════════════════════════════

  /api/auto-order:
    get:
      tags: [AutoOrder]
      summary: 자동발주 등록 품목 목록 조회
      operationId: getAutoOrder
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 자동발주 품목 목록 (origin 포함)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutoOrderItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [AutoOrder]
      summary: 자동발주 품목 등록
      operationId: postAutoOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_code]
              properties:
                product_code:
                  type: string
                min_stock:
                  type: integer
                  default: 0
                  description: "최소 재고 기준"
                order_qty:
                  type: integer
                  default: 0
                  description: "발주 수량"
                vendor_name:
                  type: string
                origin:
                  type: string
                  description: "미지정 시 products DB → XERP 캐시 → '한국' 순으로 자동 판별"
      responses:
        '200':
          description: 등록 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  origin:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auto-order/search:
    get:
      tags: [AutoOrder]
      summary: 품목 검색 (products DB + XERP 캐시 통합)
      operationId: getAutoOrderSearch
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: "검색어 (제품코드 또는 품목명 부분 일치)"
      responses:
        '200':
          description: 검색 결과 (최대 30건)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    product_code:
                      type: string
                    product_name:
                      type: string
                    brand:
                      type: string
                    origin:
                      type: string
                    already_added:
                      type: boolean
                      description: "이미 자동발주에 등록된 품목 여부"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auto-order/bulk-add:
    post:
      tags: [AutoOrder]
      summary: 생산지별 자동발주 품목 일괄 등록
      operationId: postAutoOrderBulkAdd
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                origin:
                  type: string
                  default: "중국"
                  description: "등록할 생산지 (한국/중국/더기프트)"
      responses:
        '200':
          description: 일괄 등록 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  added:
                    type: integer
                  skipped:
                    type: integer
                  origin:
                    type: string
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auto-order/check:
    post:
      tags: [AutoOrder]
      summary: 자동발주 실행 (재고 부족 품목 자동 PO 생성)
      operationId: postAutoOrderCheck
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 자동발주 실행 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: array
                    items:
                      type: object
                      properties:
                        product_code:
                          type: string
                        po_id:
                          type: integer
                        po_number:
                          type: string
                        order_qty:
                          type: integer
                        vendor:
                          type: string
                  skipped:
                    type: array
                    items:
                      type: object
                      properties:
                        product_code:
                          type: string
                        reason:
                          type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auto-order/run-scheduler:
    post:
      tags: [AutoOrder]
      summary: 자동발주 스케줄러 수동 즉시 실행
      operationId: postAutoOrderRunScheduler
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 스케줄러 실행 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/auto-order/run-shipment-check:
    post:
      tags: [AutoOrder]
      summary: 출고일 이메일 체크 수동 실행
      operationId: postAutoOrderRunShipmentCheck
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 실행 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/auto-order/{id}:
    put:
      tags: [AutoOrder]
      summary: 자동발주 품목 수정
      operationId: putAutoOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                min_stock:
                  type: integer
                order_qty:
                  type: integer
                vendor_name:
                  type: string
                enabled:
                  type: integer
                  enum: [0, 1]
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: boolean
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [AutoOrder]
      summary: 자동발주 품목 삭제
      operationId: deleteAutoOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════════════════════════════════════════════════════════════
  #  RECEIPTS (입고 관리)
  # ═══════════════════════════════════════════════════════════════════════

  /api/receipts:
    get:
      tags: [Receipts]
      summary: 입고 목록 조회 (품목 상세 포함)
      operationId: getReceipts
      security:
        - bearerAuth: []
      parameters:
        - name: po_id
          in: query
          required: false
          schema:
            type: integer
          description: "발주 ID 필터"
        - name: origin
          in: query
          required: false
          schema:
            type: string
            enum: ["한국", "중국", "더기프트"]
          description: "생산지 필터"
      responses:
        '200':
          description: 입고 목록 (items 포함)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Receipt'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Receipts]
      summary: 입고 등록 (분할 입고 지원, PO 상태 자동 갱신)
      operationId: postReceipts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [po_id, items]
              properties:
                po_id:
                  type: integer
                received_by:
                  type: string
                  description: "입고 담당자"
                notes:
                  type: string
                batch_no:
                  type: integer
                  default: 1
                  description: "배치 번호 (분할 입고 시 순번)"
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [product_code, received_qty]
                    properties:
                      po_item_id:
                        type: integer
                      product_code:
                        type: string
                      received_qty:
                        type: integer
                      defect_qty:
                        type: integer
                        default: 0
                      notes:
                        type: string
      responses:
        '200':
          description: 입고 등록 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  receipt_id:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════════════════════════════════════════════════════════════
  #  PROCUREMENT (통합 조달 관리)
  # ═══════════════════════════════════════════════════════════════════════

  /api/procurement/dashboard:
    get:
      tags: [Procurement]
      summary: 조달 대시보드 (생산지별 파이프라인, 중국 선적, 더기프트 포장 현황)
      operationId: getProcurementDashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 조달 대시보드 데이터
          content:
            application/json:
              schema:
                type: object
                properties:
                  origins:
                    type: object
                    description: "생산지별 현황 (한국/중국/더기프트)"
                    additionalProperties:
                      type: object
                      properties:
                        total:
                          type: integer
                        by_status:
                          type: object
                          additionalProperties:
                            type: integer
                        partial:
                          type: integer
                        overdue:
                          type: integer
                        receive_rate:
                          type: integer
                        recent:
                          type: array
                          items:
                            type: object
                  shipments:
                    type: array
                    description: "중국 선적 현황 (진행 중)"
                    items:
                      type: object
                  assemblies:
                    type: array
                    description: "더기프트 포장 현황 (진행 중)"
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/po-receive-status:
    get:
      tags: [Procurement]
      summary: PO별 품목 입고현황 조회 (분할입고 추적)
      operationId: getProcurementPoReceiveStatus
      security:
        - bearerAuth: []
      parameters:
        - name: origin
          in: query
          required: false
          schema:
            type: string
            enum: ["한국", "중국", "더기프트"]
          description: "생산지 필터"
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: "발주 상태 필터 (미지정 시 cancelled/draft 제외)"
      responses:
        '200':
          description: PO별 입고현황 목록 (items, progress 포함)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    po_id:
                      type: integer
                    po_number:
                      type: string
                    origin:
                      type: string
                    vendor_name:
                      type: string
                    status:
                      type: string
                    po_date:
                      type: string
                    expected_date:
                      type: string
                    po_type:
                      type: string
                    material_status:
                      type: string
                    process_status:
                      type: string
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          item_id:
                            type: integer
                          product_code:
                            type: string
                          ordered_qty:
                            type: integer
                          received_qty:
                            type: integer
                          progress:
                            type: integer
                            description: "입고율 (%)"
                    total_ordered:
                      type: integer
                    total_received:
                      type: integer
                    progress:
                      type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/receive:
    post:
      tags: [Procurement]
      summary: 분할 입고 처리 (±허용오차% 자동완료 지원, 중국 선적 연결 가능)
      operationId: postProcurementReceive
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [po_id, items]
              properties:
                po_id:
                  type: integer
                receipt_date:
                  type: string
                  format: date
                received_by:
                  type: string
                notes:
                  type: string
                shipment_id:
                  type: integer
                  description: "중국 선적 ID (연결 시)"
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [product_code, received_qty]
                    properties:
                      po_item_id:
                        type: integer
                      product_code:
                        type: string
                      received_qty:
                        type: integer
                      defect_qty:
                        type: integer
                        default: 0
                      shipped_qty:
                        type: integer
                      notes:
                        type: string
      responses:
        '200':
          description: 입고 처리 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  receipt_id:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/receive-history/{poId}:
    get:
      tags: [Procurement]
      summary: 발주별 입고이력 조회
      operationId: getProcurementReceiveHistory
      security:
        - bearerAuth: []
      parameters:
        - name: poId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 입고이력 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    receipt_date:
                      type: string
                    received_by:
                      type: string
                    receipt_notes:
                      type: string
                    product_code:
                      type: string
                    received_qty:
                      type: integer
                    defect_qty:
                      type: integer
                    item_notes:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/shipment-link:
    post:
      tags: [Procurement]
      summary: 선적에 PO 아이템 연결 (중국 선적-PO 매핑)
      operationId: postProcurementShipmentLink
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shipment_id, items]
              properties:
                shipment_id:
                  type: integer
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [po_id, product_code, shipped_qty]
                    properties:
                      po_id:
                        type: integer
                      po_item_id:
                        type: integer
                      product_code:
                        type: string
                      product_name:
                        type: string
                      shipped_qty:
                        type: integer
                      notes:
                        type: string
      responses:
        '200':
          description: 연결 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  linked:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/shipment-items/{shipmentId}:
    get:
      tags: [Procurement]
      summary: 선적에 포함된 PO 아이템 목록 조회
      operationId: getProcurementShipmentItems
      security:
        - bearerAuth: []
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 선적 PO 아이템 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    shipment_id:
                      type: integer
                    po_id:
                      type: integer
                    po_item_id:
                      type: integer
                    product_code:
                      type: string
                    product_name:
                      type: string
                    shipped_qty:
                      type: integer
                    po_number:
                      type: string
                    vendor_name:
                      type: string
                    origin:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/assembly:
    get:
      tags: [Procurement]
      summary: 더기프트 포장작업 목록 조회 (자재 포함)
