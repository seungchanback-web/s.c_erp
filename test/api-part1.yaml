            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                completed_qty:
                  type: integer
      responses:
        '200':
          description: 포장완료 처리 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  completed:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/assembly/{id}/ship:
