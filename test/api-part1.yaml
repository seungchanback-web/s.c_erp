        - bearerAuth: []
      responses:
        '200':
          description: 발주 통계
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline:
                    type: object
                    description: "상태별 발주 건수"
                    additionalProperties:
                      type: integer
                  pipelineQty:
                    type: object
                    description: "상태별 발주 수량"
                    additionalProperties:
                      type: integer
                  totalOrdered:
                    type: integer
                  totalReceived:
                    type: integer
                  receiveRate:
                    type: number
                    description: "입고율 (%)"
                  cancelRate:
                    type: number
                  cancelCount:
                    type: integer
                  totalCount:
                    type: integer
                  vendorTop:
                    type: array
                    items:
                      type: object
                      properties:
                        vendor:
                          type: string
                        count:
                          type: integer
                        qty:
                          type: integer
                  recentPOs:
                    type: array
                    items:
                      type: object
                  monthPOCount:
                    type: integer
                  pendingCount:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/po/bulk-import:
    post:
      tags: [PurchaseOrders]
      summary: 발주 엑셀 일괄 생성 (거래처별 자동 그룹핑)
