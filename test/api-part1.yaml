  # ═══════════════════════════════════════════════════════════════════════
  #  PURCHASE ORDERS (발주 관리)
  # ═══════════════════════════════════════════════════════════════════════

  /api/po:
    get:
      tags: [PurchaseOrders]
      summary: 발주 목록 조회 (필터 지원)
      operationId: getPOList
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, sent, confirmed, partial, received, cancelled, os_pending, os_registered]
          description: "발주 상태 필터"
        - name: vendor
          in: query
          required: false
          schema:
            type: string
          description: "거래처명 검색 (부분 일치)"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "발주일 시작 (YYYY-MM-DD)"
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "발주일 종료 (YYYY-MM-DD)"
        - name: origin
          in: query
          required: false
          schema:
            type: string
            enum: ["한국", "중국", "더기프트"]
          description: "생산지 필터"
        - name: include
          in: query
          required: false
          schema:
            type: string
            enum: [items]
          description: "items 지정 시 품목 정보 포함"
      responses:
        '200':
          description: 발주 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/POHeader'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [PurchaseOrders]
      summary: 발주 생성
      operationId: postPO
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vendor_name:
                  type: string
                  description: "거래처명 (vendor_id 미제공 시 필수)"
                vendor_id:
                  type: integer
                  description: "거래처 ID (vendor_name 자동 조회)"
                po_type:
                  type: string
                  default: "material"
                  description: "원재료/후공정"
                status:
                  type: string
                  default: "대기"
                expected_date:
                  type: string
                  format: date
                  description: "납기예정일 (due_date 별칭도 가능)"
                due_date:
                  type: string
                  format: date
                origin:
                  type: string
                  description: "생산지 (미지정 시 첫 품목의 products.origin 자동 조회)"
                notes:
                  type: string
                process_step:
                  type: integer
                  default: 0
                parent_po_id:
                  type: integer
                process_chain:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    required: [product_code, ordered_qty]
                    properties:
                      product_code:
                        type: string
                      brand:
                        type: string
                      process_type:
                        type: string
                      ordered_qty:
                        type: integer
                      spec:
                        type: string
                      notes:
                        type: string
      responses:
        '200':
          description: 발주 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  po_id:
                    type: integer
                  po_number:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/po/stats:
    get:
      tags: [PurchaseOrders]
      summary: 발주 대시보드 통계 (파이프라인, 입고율, 거래처 TOP5 등)
      operationId: getPOStats
