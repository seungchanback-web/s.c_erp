  /api/procurement/create-korea-po:
    post:
      tags: [Procurement]
      summary: 한국 후공정 PO 생성 (제지사 + 후공정 2단계, 거래명세서 자동 생성)
      operationId: postProcurementCreateKoreaPo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [material_vendor, process_vendor, items]
              properties:
                material_vendor:
