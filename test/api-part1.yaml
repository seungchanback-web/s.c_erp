          application/json:
            schema:
              type: object
              required: [po_id, stage]
              properties:
                po_id:
                  type: integer
                stage:
                  type: string
                  description: "새 단계 (한국: 자재지급/가공중, 중국: 제작중/선적/통관, 더기프트: 포장/출고)"
