                  totalReceived:
                    type: integer
                  tolerancePct:
                    type: number
                  lowerBound:
                    type: integer
                  upperBound:
                    type: integer
                  needsForceApprove:
                    type: boolean
                  tradeDocs:
                    type: array
                    items:
                      type: object
                  logs:
                    type: array
                    items:
                      type: object
        '404':
          $ref: '#/components/responses/NotFound'
