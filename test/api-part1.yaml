                actor:
                  type: string
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [product_code, ordered_qty]
                    properties:
                      product_code:
                        type: string
                      brand:
                        type: string
                      process_type:
                        type: string
                      ordered_qty:
                        type: integer
                      spec:
                        type: string
      responses:
        '200':
          description: PO 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  po_id:
                    type: integer
                  po_number:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/china-shipments:
    get:
