                items:
                  type: array
                  items:
                    type: object
                    required: [vendor_name, product_code, qty]
                    properties:
                      vendor_name:
                        type: string
                      product_code:
                        type: string
                      qty:
                        type: integer
      responses:
        '200':
          description: 생성 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: array
                    items:
                      type: object
                      properties:
                        po_number:
                          type: string
                        vendor:
                          type: string
                        items_count:
                          type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        vendor:
                          type: string
                        error:
                          type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/po/os-pending:
    get:
      tags: [PurchaseOrders]
      summary: OS등록 대기 발주 목록 (os_pending, os_registered 상태)
      operationId: getPOOsPending
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OS등록 대기 발주 목록 (품목 포함)
          content:
            application/json:
