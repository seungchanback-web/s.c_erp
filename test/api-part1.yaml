  # ═══════════════════════════════════════════════════════════════════════
  #  INVENTORY / XERP (재고 조회)
  # ═══════════════════════════════════════════════════════════════════════

  /api/xerp-inventory:
    get:
      tags: [Inventory]
      summary: XERP 실시간 재고 조회 (법인별, 10분 캐시)
      operationId: getXerpInventory
      security:
        - bearerAuth: []
      parameters:
        - name: company
          in: query
          required: false
          schema:
            type: string
            enum: [barunson, dd]
            default: barunson
          description: "법인 구분 (barunson=바른손, dd=DD디얼디어)"
        - name: refresh
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "0"]
          description: "캐시 무효화 강제 갱신 (1=갱신)"
      responses:
        '200':
          description: XERP 재고 데이터 (mmInventory + mmInoutItem 통합)
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/XerpInventoryProduct'
                  updated:
                    type: string
                    format: date-time
                  count:
                    type: integer
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/inventory/pending-orders:
    get:
      tags: [Inventory]
      summary: 품목별 미입고 잔량 조회 (중복발주 방지용)
      operationId: getInventoryPendingOrders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "품목코드 → 미입고 잔량 맵"
          content:
            application/json:
              schema:
                type: object
                description: "제품코드를 키로 하는 객체"
                additionalProperties:
                  type: object
                  properties:
                    pending_qty:
                      type: integer
                    os_numbers:
                      type: array
                      items:
                        type: string
                    po_numbers:
                      type: array
                      items:
                        type: string
                    earliest_due:
                      type: string
                    status:
                      type: string
                    last_order_date:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/xerp-receiving-codes:
    get:
      tags: [Inventory]
      summary: XERP 입고이력 품목코드 목록 (발주이력 판별용)
      operationId: getXerpReceivingCodes
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{8}$'
            example: "20250801"
          description: "시작일 (YYYYMMDD, 기본 20250801)"
        - name: to
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{8}$'
            example: "20260228"
          description: "종료일 (YYYYMMDD, 기본 20260228)"
      responses:
        '200':
          description: 입고이력 품목코드 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  codes:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                  from:
                    type: string
                  to:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/xerp-monthly-usage:
    get:
      tags: [Inventory]
      summary: XERP 월평균 출고량 조회 (최근 3개월, 1시간 캐시)
      operationId: getXerpMonthlyUsage
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "품목코드 → 출고량 맵"
          content:
            application/json:
              schema:
                type: object
                description: "제품코드를 키로 하는 출고량 객체"
                additionalProperties:
                  type: object
                  properties:
                    total:
                      type: integer
                      description: "3개월 총 출고량"
                    monthly:
                      type: integer
                      description: "월 평균 출고량"
                    daily:
                      type: integer
                      description: "일 평균 출고량"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════
  #  WAREHOUSES (다중 창고 관리)
  # ═══════════════════════════════════════════════════════════════════════

  /api/warehouses:
    get:
      tags: [Warehouses]
      summary: 창고 목록 조회 (기본창고 우선 정렬)
      operationId: getWarehouses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 창고 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Warehouse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Warehouses]
      summary: 창고 등록
      operationId: postWarehouses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code:
                  type: string
                  description: "창고코드 (고유값)"
                name:
                  type: string
                location:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: 창고 등록 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 이미 존재하는 창고코드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/warehouses/{id}:
    put:
      tags: [Warehouses]
      summary: 창고 정보 수정
      operationId: putWarehouse
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                location:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Warehouses]
      summary: 창고 삭제 (기본창고 및 재고 잔여 창고 삭제 불가)
      operationId: deleteWarehouse
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/warehouses/inventory:
    get:
      tags: [Warehouses]
      summary: 창고 재고 조회 (창고별 또는 전체 품목 합산)
      operationId: getWarehousesInventory
      security:
        - bearerAuth: []
      parameters:
        - name: warehouse_id
          in: query
          required: false
          schema:
            type: integer
          description: "창고 ID (미지정 시 전체 품목 합산)"
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: "제품코드 또는 품목명 검색"
      responses:
        '200':
          description: 창고 재고 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    product_code:
                      type: string
                    product_name:
                      type: string
                    quantity:
                      type: integer
                    total_qty:
                      type: integer
                    breakdown:
                      type: string
                      description: "전체 조회 시 창고별 분포 (예: '본사:100 | 외부:50')"
                    warehouse_name:
                      type: string
                    warehouse_code:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Warehouses]
      summary: 창고 재고 입력/수정 (단건)
      operationId: postWarehousesInventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [warehouse_id, product_code]
              properties:
                warehouse_id:
                  type: integer
                product_code:
                  type: string
                product_name:
                  type: string
                quantity:
                  type: integer
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/warehouses/inventory/bulk:
    post:
      tags: [Warehouses]
      summary: 창고 재고 일괄 입력 (XERP 동기화 등 대량 upsert)
      operationId: postWarehousesInventoryBulk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [warehouse_id, items]
              properties:
                warehouse_id:
                  type: integer
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [product_code, quantity]
                    properties:
                      product_code:
                        type: string
                      product_name:
                        type: string
                      quantity:
                        type: integer
      responses:
        '200':
          description: 저장 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/warehouses/transfer:
    post:
      tags: [Warehouses]
      summary: 창고 간 재고 이동
      operationId: postWarehousesTransfer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_warehouse, to_warehouse, product_code, quantity]
              properties:
                from_warehouse:
                  type: integer
                  description: "출발 창고 ID"
                to_warehouse:
                  type: integer
                  description: "도착 창고 ID"
                product_code:
                  type: string
                product_name:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
                operator:
                  type: string
                  description: "담당자"
                memo:
                  type: string
      responses:
        '200':
          description: 이동 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/warehouses/transfers:
    get:
      tags: [Warehouses]
      summary: 창고 이동 이력 조회 (다양한 필터 지원)
      operationId: getWarehousesTransfers
      security:
        - bearerAuth: []
      parameters:
        - name: from_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "조회 시작일"
        - name: to_date
          in: query
          required: false
          schema:
            type: string
            format: date
