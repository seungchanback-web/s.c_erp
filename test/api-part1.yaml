                tracking_number:
                  type: string
                carrier:
                  type: string
                shipped_date:
                  type: string
                  format: date
                delivery_address:
                  type: string
                recipient_name:
                  type: string
      responses:
        '200':
          description: 출고 등록 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  shipped:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/assembly/{id}/deliver:
    post:
      tags: [Procurement]
      summary: 더기프트 배송완료 처리
      operationId: postProcurementAssemblyDeliver
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 배송완료 처리 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivered:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/force-complete:
    post:
      tags: [Procurement]
      summary: 발주 관리자 강제완료 (허용범위 미달 시)
      operationId: postProcurementForceComplete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
