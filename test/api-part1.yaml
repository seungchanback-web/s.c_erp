                  $ref: '#/components/schemas/POHeader'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/po/os-match:
    get:
      tags: [PurchaseOrders]
      summary: XERP OS번호 자동 매칭 (최근 2개월 poOrderHeader 기준)
      operationId: getPOOsMatch
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 매칭 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  unmatched:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  completed:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  cancelled:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  verified:
                    type: array
                    items:
                      type: object
                  mismatched:
                    type: array
                    items:
                      type: object
                  xerp_match_count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/po/{id}:
    get:
      tags: [PurchaseOrders]
      summary: 발주 상세 조회 (품목 포함)
      operationId: getPOById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 발주 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/POHeader'
