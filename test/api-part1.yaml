            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    assembly_no:
                      type: string
                    product_code:
                      type: string
                    product_name:
                      type: string
                    target_qty:
                      type: integer
                    completed_qty:
                      type: integer
                    assembly_date:
                      type: string
                    worker_name:
                      type: string
                    status:
                      type: string
                    delivery_status:
                      type: string
                    materials:
                      type: array
                      items:
                        type: object
                        properties:
                          item_code:
                            type: string
                          item_name:
                            type: string
                          required_qty:
                            type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Procurement]
      summary: 포장작업 생성
      operationId: postProcurementAssembly
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_code, target_qty]
              properties:
                product_code:
                  type: string
                product_name:
                  type: string
                target_qty:
                  type: integer
                assembly_date:
                  type: string
                  format: date
                worker_name:
                  type: string
                notes:
                  type: string
                materials:
                  type: array
                  items:
                    type: object
                    required: [item_code, required_qty]
                    properties:
                      item_code:
                        type: string
                      item_name:
                        type: string
                      required_qty:
                        type: integer
      responses:
        '200':
          description: 포장작업 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  assembly_no:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/assembly/{id}/complete:
    post:
      tags: [Procurement]
