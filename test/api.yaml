  # ═══════════════════════════════════════════════════════════════════════
  #  INVENTORY / XERP (재고 조회)
  # ═══════════════════════════════════════════════════════════════════════

  /api/xerp-inventory:
    get:
      tags: [Inventory]
      summary: XERP 실시간 재고 조회 (법인별, 10분 캐시)
      operationId: getXerpInventory
      security:
        - bearerAuth: []
      parameters:
        - name: company
          in: query
          required: false
          schema:
            type: string
            enum: [barunson, dd]
            default: barunson
          description: "법인 구분 (barunson=바른손, dd=DD디얼디어)"
        - name: refresh
          in: query
          required: false
          schema:
            type: string
            enum: ["1", "0"]
          description: "캐시 무효화 강제 갱신 (1=갱신)"
      responses:
        '200':
          description: XERP 재고 데이터 (mmInventory + mmInoutItem 통합)
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/XerpInventoryProduct'
                  updated:
                    type: string
                    format: date-time
                  count:
                    type: integer
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/inventory/pending-orders:
    get:
      tags: [Inventory]
      summary: 품목별 미입고 잔량 조회 (중복발주 방지용)
      operationId: getInventoryPendingOrders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "품목코드 → 미입고 잔량 맵"
          content:
            application/json:
              schema:
                type: object
                description: "제품코드를 키로 하는 객체"
                additionalProperties:
                  type: object
                  properties:
                    pending_qty:
                      type: integer
                    os_numbers:
                      type: array
                      items:
                        type: string
                    po_numbers:
                      type: array
                      items:
                        type: string
                    earliest_due:
                      type: string
                    status:
                      type: string
                    last_order_date:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/xerp-receiving-codes:
    get:
      tags: [Inventory]
      summary: XERP 입고이력 품목코드 목록 (발주이력 판별용)
      operationId: getXerpReceivingCodes
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{8}$'
            example: "20250801"
          description: "시작일 (YYYYMMDD, 기본 20250801)"
        - name: to
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{8}$'
            example: "20260228"
          description: "종료일 (YYYYMMDD, 기본 20260228)"
      responses:
        '200':
          description: 입고이력 품목코드 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  codes:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                  from:
                    type: string
                  to:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/xerp-monthly-usage:
    get:
      tags: [Inventory]
      summary: XERP 월평균 출고량 조회 (최근 3개월, 1시간 캐시)
      operationId: getXerpMonthlyUsage
      security:
        - bearerAuth: []
      responses:
        '200':
          description: "품목코드 → 출고량 맵"
          content:
            application/json:
              schema:
                type: object
                description: "제품코드를 키로 하는 출고량 객체"
                additionalProperties:
                  type: object
                  properties:
                    total:
                      type: integer
                      description: "3개월 총 출고량"
                    monthly:
                      type: integer
                      description: "월 평균 출고량"
                    daily:
                      type: integer
                      description: "일 평균 출고량"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ═══════════════════════════════════════════════════════════════════════
  #  WAREHOUSES (다중 창고 관리)
