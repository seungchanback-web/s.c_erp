                    shipment_date:
                      type: string
                    bl_number:
                      type: string
                    ship_date:
                      type: string
                    eta_date:
                      type: string
                    status:
                      type: string
                    total_boxes:
                      type: integer
                    total_items:
                      type: integer
                    po_items:
                      type: array
                      items:
                        type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/procurement/china-shipment-link:
    post:
