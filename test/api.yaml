  # ═══════════════════════════════════════════════════════════════════════
  #  PURCHASE ORDERS (발주 관리)
  # ═══════════════════════════════════════════════════════════════════════

  /api/po:
    get:
      tags: [PurchaseOrders]
      summary: 발주 목록 조회 (필터 지원)
      operationId: getPOList
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, sent, confirmed, partial, received, cancelled, os_pending, os_registered]
          description: "발주 상태 필터"
        - name: vendor
          in: query
          required: false
          schema:
            type: string
          description: "거래처명 검색 (부분 일치)"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "발주일 시작 (YYYY-MM-DD)"
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: "발주일 종료 (YYYY-MM-DD)"
        - name: origin
          in: query
          required: false
          schema:
            type: string
            enum: ["한국", "중국", "더기프트"]
          description: "생산지 필터"
        - name: include
          in: query
          required: false
          schema:
            type: string
            enum: [items]
          description: "items 지정 시 품목 정보 포함"
      responses:
        '200':
          description: 발주 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/POHeader'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [PurchaseOrders]
      summary: 발주 생성
      operationId: postPO
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vendor_name:
                  type: string
                  description: "거래처명 (vendor_id 미제공 시 필수)"
                vendor_id:
                  type: integer
                  description: "거래처 ID (vendor_name 자동 조회)"
                po_type:
                  type: string
                  default: "material"
                  description: "원재료/후공정"
                status:
                  type: string
                  default: "대기"
                expected_date:
                  type: string
                  format: date
                  description: "납기예정일 (due_date 별칭도 가능)"
                due_date:
                  type: string
                  format: date
                origin:
                  type: string
                  description: "생산지 (미지정 시 첫 품목의 products.origin 자동 조회)"
                notes:
                  type: string
                process_step:
                  type: integer
                  default: 0
                parent_po_id:
                  type: integer
                process_chain:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    required: [product_code, ordered_qty]
                    properties:
                      product_code:
                        type: string
                      brand:
                        type: string
                      process_type:
                        type: string
                      ordered_qty:
                        type: integer
                      spec:
                        type: string
                      notes:
                        type: string
      responses:
        '200':
          description: 발주 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  po_id:
                    type: integer
                  po_number:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/po/stats:
    get:
      tags: [PurchaseOrders]
      summary: 발주 대시보드 통계 (파이프라인, 입고율, 거래처 TOP5 등)
      operationId: getPOStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 발주 통계
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline:
                    type: object
                    description: "상태별 발주 건수"
                    additionalProperties:
                      type: integer
                  pipelineQty:
                    type: object
                    description: "상태별 발주 수량"
                    additionalProperties:
                      type: integer
                  totalOrdered:
                    type: integer
                  totalReceived:
                    type: integer
                  receiveRate:
                    type: number
                    description: "입고율 (%)"
                  cancelRate:
                    type: number
                  cancelCount:
                    type: integer
                  totalCount:
                    type: integer
                  vendorTop:
                    type: array
                    items:
                      type: object
                      properties:
                        vendor:
                          type: string
                        count:
                          type: integer
                        qty:
                          type: integer
                  recentPOs:
                    type: array
                    items:
                      type: object
                  monthPOCount:
                    type: integer
                  pendingCount:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/po/bulk-import:
    post:
      tags: [PurchaseOrders]
      summary: 발주 엑셀 일괄 생성 (거래처별 자동 그룹핑)
      operationId: postPOBulkImport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [vendor_name, product_code, qty]
                    properties:
                      vendor_name:
                        type: string
                      product_code:
                        type: string
                      qty:
                        type: integer
      responses:
        '200':
          description: 생성 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: array
                    items:
                      type: object
                      properties:
                        po_number:
                          type: string
                        vendor:
                          type: string
                        items_count:
                          type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        vendor:
                          type: string
                        error:
                          type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/po/os-pending:
    get:
      tags: [PurchaseOrders]
      summary: OS등록 대기 발주 목록 (os_pending, os_registered 상태)
      operationId: getPOOsPending
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OS등록 대기 발주 목록 (품목 포함)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/POHeader'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/po/os-match:
    get:
      tags: [PurchaseOrders]
      summary: XERP OS번호 자동 매칭 (최근 2개월 poOrderHeader 기준)
      operationId: getPOOsMatch
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 매칭 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  unmatched:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  completed:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  cancelled:
                    type: array
                    items:
                      $ref: '#/components/schemas/POHeader'
                  verified:
                    type: array
                    items:
                      type: object
                  mismatched:
                    type: array
                    items:
                      type: object
                  xerp_match_count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/po/{id}:
    get:
      tags: [PurchaseOrders]
      summary: 발주 상세 조회 (품목 포함)
      operationId: getPOById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 발주 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/POHeader'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [PurchaseOrders]
      summary: 발주 상태 변경 (발송 시 이메일·Google Sheet 자동 처리)
      operationId: patchPO
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  description: "새 상태 (한국어 또는 영어 코드 모두 가능)"
                  example: "발송"
                force_email:
                  type: boolean
                  description: "후공정 PO 강제 이메일 발송"
                  default: false
      responses:
        '200':
          description: 상태 변경 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: boolean
                  po_id:
                    type: integer
                  status:
                    type: string
                  google_sheet:
                    type: object
                  email:
                    type: object
                  email_failed:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [PurchaseOrders]
      summary: 발주 삭제 (입고이력 포함 전체 삭제)
      operationId: deletePO
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  po_number:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

