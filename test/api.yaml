          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Warehouses]
      summary: 창고 재고 입력/수정 (단건)
      operationId: postWarehousesInventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [warehouse_id, product_code]
              properties:
                warehouse_id:
                  type: integer
                product_code:
                  type: string
                product_name:
                  type: string
                quantity:
                  type: integer
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/warehouses/inventory/bulk:
    post:
      tags: [Warehouses]
      summary: 창고 재고 일괄 입력 (XERP 동기화 등 대량 upsert)
      operationId: postWarehousesInventoryBulk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [warehouse_id, items]
              properties:
                warehouse_id:
                  type: integer
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [product_code, quantity]
                    properties:
                      product_code:
                        type: string
                      product_name:
                        type: string
                      quantity:
                        type: integer
      responses:
        '200':
          description: 저장 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/warehouses/transfer:
    post:
      tags: [Warehouses]
      summary: 창고 간 재고 이동
      operationId: postWarehousesTransfer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_warehouse, to_warehouse, product_code, quantity]
              properties:
                from_warehouse:
                  type: integer
                  description: "출발 창고 ID"
                to_warehouse:
                  type: integer
                  description: "도착 창고 ID"
                product_code:
                  type: string
                product_name:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
                operator:
                  type: string
                  description: "담당자"
                memo:
                  type: string
      responses:
        '200':
          description: 이동 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
