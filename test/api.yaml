      security:
        - bearerAuth: []
      responses:
        '200':
          description: 창고 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Warehouse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Warehouses]
      summary: 창고 등록
      operationId: postWarehouses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code:
                  type: string
                  description: "창고코드 (고유값)"
                name:
                  type: string
                location:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: 창고 등록 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 이미 존재하는 창고코드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

