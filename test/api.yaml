                  type: string
                status:
                  type: string
                  enum: [active, inactive]
                material_code:
                  type: string
                material_name:
                  type: string
                unit:
                  type: string
                cut_spec:
                  type: string
                jopan:
                  type: string
                paper_maker:
                  type: string
                memo:
                  type: string
                op_category:
                  type: string
