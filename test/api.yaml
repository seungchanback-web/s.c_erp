  /api/shipments:
    get:
      tags: [Shipments]
      summary: XERP 출고현황 조회 (mmInoutItem 실시간, 기본 최근 1개월)
      operationId: getShipments
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{8}$'
            example: "20260301"
          description: "시작일 (YYYYMMDD, 기본 최근 1개월)"
        - name: to
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{8}$'
            example: "20260407"
          description: "종료일 (YYYYMMDD, 기본 오늘)"
        - name: gubun
          in: query
          required: false
          schema:
            type: string
            example: "SO,MO"
          description: "출고구분 콤마 구분 (SO=판매출고, MO=이동출고, SI=구매입고, MI=이동입고, 기본=전체)"
      responses:
        '200':
          description: XERP 출고현황 목록 (품목코드별 일자별 합산)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        item_code:
                          type: string
                        item_name:
                          type: string
                        InoutDate:
                          type: string
                          description: "출고일 (YYYYMMDD)"
                        gubun:
                          type: string
                          description: "출고구분 (SO/MO/SI/MI)"
                        qty:
                          type: number
                          description: "출고 수량"
                        amnt:
                          type: number
                          description: "출고 금액"
                  from:
                    type: string
                  to:
                    type: string
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: XERP 데이터베이스 미연결
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
