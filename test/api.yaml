                      product_name:
                        type: string
                      brand:
                        type: string
                      origin:
                        type: string
                      material_code:
                        type: string
                      material_name:
                        type: string
                      cut_spec:
                        type: string
                      jopan:
                        type: string
                      paper_maker:
                        type: string
                      memo:
                        type: string
                      op_category:
                        type: string
      responses:
        '200':
          description: 처리 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
                  updated:
                    type: integer
                  total:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/products/{id}:
    put:
      tags: [Products]
