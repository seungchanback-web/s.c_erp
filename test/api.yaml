      operationId: getWarehousesInventory
      security:
        - bearerAuth: []
      parameters:
        - name: warehouse_id
          in: query
          required: false
          schema:
            type: integer
          description: "창고 ID (미지정 시 전체 품목 합산)"
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: "제품코드 또는 품목명 검색"
      responses:
        '200':
          description: 창고 재고 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    product_code:
                      type: string
                    product_name:
                      type: string
                    quantity:
                      type: integer
                    total_qty:
                      type: integer
                    breakdown:
                      type: string
                      description: "전체 조회 시 창고별 분포 (예: '본사:100 | 외부:50')"
