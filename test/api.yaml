# OpenAPI 3.0.3 — 바른컴퍼니 ERP API (Full Merged)
# Total endpoints: 360 operations across 296 paths
# Merged from api-part1.yaml (72 paths), api-part2.yaml (120 paths), api-part3.yaml (113 paths)
# Duplicates resolved (kept more detailed): ['/api/activity-log', '/api/health', '/api/menu-settings', '/api/stats/vendor-summary'] + ['/api/vat/report', '/api/vat/report/save', '/api/vat/report/{id}', '/api/vat/sales-list', '/api/vat/summary']
#
openapi: 3.0.3
info:
  title: 바른컴퍼니 ERP API (Part 1)
  description: |
    바른컴퍼니 ERP 시스템 REST API — Part 1
    인증/제품/거래처/발주/자동발주/입고/조달/재고/창고/출고 모듈 포함.

    모든 보호된 엔드포인트는 Bearer JWT 토큰이 필요합니다.
    로그인 또는 Google OAuth 로그인 후 반환된 token을 Authorization 헤더에 첨부하세요.
  version: "1.0.0"
  contact:
    name: 바른컴퍼니 개발팀

servers:
  - url: http://localhost:12026
    description: 로컬 개발 서버
  - url: http://{host}:12026
    description: 프로덕션 서버
    variables:
      host:
        default: localhost

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: POST /api/auth/login 또는 /api/auth/google 에서 발급된 JWT 토큰

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "오류 메시지"

    User:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        display_name:
          type: string
        role:
          type: string
          enum: [admin, manager, viewer]
        email:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Bearer 토큰
        user:
          $ref: '#/components/schemas/User'

    Vendor:
      type: object
      properties:
        vendor_id:
          type: integer
        vendor_code:
          type: string
        name:
          type: string
        type:
          type: string
          description: "거래처 유형 (원재료/후공정/기타)"
        contact:
          type: string
        phone:
          type: string
        email:
          type: string
        email_cc:
          type: string
        kakao:
          type: string
        memo:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: integer
        product_code:
          type: string
        product_name:
          type: string
        brand:
          type: string
        origin:
          type: string
          description: "생산지 (한국/중국/더기프트)"
        category:
          type: string
        status:
          type: string
          enum: [active, inactive]
        material_code:
          type: string
        material_name:
          type: string
        unit:
          type: string
          default: EA
        cut_spec:
          type: string
          description: "절 규격"
        jopan:
          type: string
          description: "조판"
        paper_maker:
          type: string
          description: "원지사"
        post_vendor:
          type: string
          description: "후공정 업체"
        memo:
          type: string
        op_category:
          type: string
        updated_at:
          type: string
          format: date-time

    POItem:
      type: object
      properties:
        item_id:
          type: integer
        po_id:
          type: integer
        product_code:
          type: string
        brand:
          type: string
        process_type:
          type: string
        ordered_qty:
          type: integer
        received_qty:
          type: integer
        spec:
          type: string
        notes:
          type: string

    POHeader:
      type: object
      properties:
        po_id:
          type: integer
        po_number:
          type: string
        po_type:
          type: string
          description: "원재료/후공정"
        vendor_name:
          type: string
        status:
          type: string
          enum: [draft, sent, confirmed, partial, received, cancelled, os_pending, os_registered]
        due_date:
          type: string
          format: date
          description: "납기예정일"
        po_date:
          type: string
          format: date
        total_qty:
          type: integer
        origin:
          type: string
          description: "생산지 (한국/중국/더기프트)"
        notes:
          type: string
        os_number:
          type: string
        material_status:
          type: string
        process_status:
          type: string
        process_step:
          type: integer
        tolerance_pct:
          type: number
          description: "입고 허용 오차 %"
        items:
          type: array
          items:
            $ref: '#/components/schemas/POItem'

    Receipt:
      type: object
      properties:
        receipt_id:
          type: integer
        po_id:
          type: integer
        po_number:
          type: string
        vendor_name:
          type: string
        origin:
          type: string
        receipt_date:
          type: string
          format: date
        received_by:
          type: string
        notes:
          type: string
        batch_no:
          type: integer
        created_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            type: object
            properties:
              receipt_item_id:
                type: integer
              po_item_id:
                type: integer
              product_code:
                type: string
              received_qty:
                type: integer
              defect_qty:
                type: integer
              notes:
                type: string

    AutoOrderItem:
      type: object
      properties:
        id:
          type: integer
        product_code:
          type: string
        min_stock:
          type: integer
          description: "최소 재고 기준"
        order_qty:
          type: integer
          description: "자동 발주 수량"
        vendor_name:
          type: string
        enabled:
          type: integer
          description: "활성화 여부 (1/0)"
        origin:
          type: string

    XerpInventoryProduct:
      type: object
      properties:
        제품코드:
          type: string
        품목명:
          type: string
        브랜드:
          type: string
        생산지:
          type: string
        현재고:
          type: integer
        가용재고:
          type: integer
        요청량:
          type: integer
        _xerpMonthly:
          type: integer
          description: "월 평균 출고량"
        _xerpDaily:
          type: integer
          description: "일 평균 출고량"
        _xerpTotal3m:
          type: integer
          description: "최근 3개월 총 출고량"
        _원자재코드:
          type: string
        _원재료용지명:
          type: string
        _절:
          type: string
        _조판:
          type: string
        _원지사:
          type: string
        _후공정업체:
          type: string

    Warehouse:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        location:
          type: string
        description:
          type: string
        is_default:
          type: integer
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

  responses:
    Unauthorized:
      description: 인증 토큰이 없거나 유효하지 않습니다
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: 권한이 없습니다
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 리소스를 찾을 수 없습니다
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: 잘못된 요청 파라미터
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

tags:
  - name: Health
    description: 헬스체크
  - name: Auth
    description: 인증 및 사용자 관리
  - name: Products
    description: 품목(제품) 관리
  - name: Vendors
    description: 거래처 관리
  - name: PurchaseOrders
    description: 발주 관리 (PO)
  - name: AutoOrder
    description: 자동발주 관리
  - name: Receipts
    description: 입고 관리
  - name: Procurement
    description: 통합 조달 관리 (한국/중국/더기프트)
  - name: Inventory
    description: XERP 재고 조회 및 재고 관리
  - name: Warehouses
    description: 다중 창고 관리
  - name: Shipments
    description: 출고현황 (XERP 실시간)

paths:
  /api/health:
    get:
      tags: [Health]
      summary: 시스템 헬스체크
      operationId: getHealth
      security: []
      responses:
        '200':
          description: 시스템 상태
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  timestamp:
                    type: string
                    format: date-time
                  checks:
                    type: object
                    properties:
                      postgresql:
                        type: string
                      xerp:
                        type: string
                      smtp:
                        type: string
                      google_sheet:
                        type: string
                      backup:
                        type: string

  # ═══════════════════════════════════════════════════════════════════════
  #  AUTH
  # ═══════════════════════════════════════════════════════════════════════

  /api/auth/config:
    get:
      tags: [Auth]
      summary: 인증 설정 조회 (Google Client ID 등)
      operationId: getAuthConfig
      security: []
      responses:
        '200':
          description: 클라이언트용 인증 설정
          content:
            application/json:
              schema:
                type: object
                properties:
                  google_client_id:
                    type: string
                  allowed_domains:
                    type: array
                    items:
                      type: string
                  auth_mode:
                    type: string
                    enum: [google, password]

  /api/auth/local-bypass:
    get:
      tags: [Auth]
      summary: 로컬 개발용 인증 우회 (localhost 전용)
      operationId: getLocalBypass
      security: []
      responses:
        '200':
          description: 관리자 JWT 토큰 발급
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 로컬 계정 로그인 (이메일 또는 아이디 + 비밀번호)
      operationId: postAuthLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: "이메일 주소 또는 사용자명"
                  example: "user@barunn.net"
                password:
                  type: string
                  format: password
                  example: "mypassword"
      responses:
        '200':
          description: 로그인 성공, JWT 토큰 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/google:
    post:
      tags: [Auth]
      summary: Google OAuth 로그인 (Google ID Token 검증)
      operationId: postAuthGoogle
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential:
                  type: string
                  description: "Google Sign-In에서 반환된 ID Token (credential)"
      responses:
        '200':
          description: Google 로그인 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - type: object
                    properties:
                      user:
                        type: object
                        properties:
                          profile_picture:
                            type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: 회원가입 (허용 도메인 이메일만 가능, 기본 role은 viewer)
      operationId: postAuthRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "user@barunn.net"
                password:
                  type: string
                  minLength: 4
                display_name:
                  type: string
      responses:
        '200':
          description: 가입 성공, JWT 토큰 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 이미 등록된 이메일
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: 현재 로그인 사용자 정보 조회
      operationId: getAuthMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 사용자 정보, 권한, 즐겨찾기, 메뉴 설정
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  permissions:
                    type: array
                    items:
                      type: string
                    description: "권한 목록 (admin은 ['*'])"
                  favorites:
                    type: array
                    items:
                      type: string
                  menuEnabled:
                    type: object
                    description: "메뉴별 활성화 상태 (page_id → boolean)"
                    additionalProperties:
                      type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/pages:
    get:
      tags: [Auth]
      summary: 허용된 페이지 목록 조회
      operationId: getAuthPages
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 페이지 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: 비밀번호 변경
      operationId: postAuthChangePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 4
      responses:
        '200':
          description: 비밀번호 변경 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/favorites:
    get:
      tags: [Auth]
      summary: 즐겨찾기 목록 조회
      operationId: getAuthFavorites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 즐겨찾기 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Auth]
      summary: 즐겨찾기 목록 저장
      operationId: putAuthFavorites
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                favorites:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/users:
    get:
      tags: [Auth]
      summary: 사용자 목록 조회 (관리자 전용)
      operationId: getAuthUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 사용자 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Auth]
      summary: 사용자 생성 (관리자 전용)
      operationId: postAuthUsers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username:
                  type: string
                password:
                  type: string
                display_name:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, manager, viewer]
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 사용자 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/menu-settings:
    get:
      summary: 메뉴 설정 조회
      operationId: getMenuSettings
      tags: [Settings]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 메뉴 설정 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings: { type: object }
        '401':
          description: 인증 필요
    post:
      summary: 메뉴 설정 저장 (관리자 전용)
      operationId: saveMenuSettings
      tags: [Settings]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settings]
              properties:
                settings:
                  type: object
                  description: page_id 키별 is_enabled, sort_order 설정
                  additionalProperties:
                    type: object
                    properties:
                      is_enabled: { type: boolean }
                      sort_order: { type: integer }
      responses:
        '200':
          description: 저장 성공
        '401':
          description: 인증 필요
        '403':
          description: 관리자 권한 필요

  /api/refresh:
    get:
      tags: [Inventory]
      summary: ERP 엑셀/JSON 데이터 새로고침 (레거시)
      operationId: getRefresh
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 갱신 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  count:
                    type: integer
                  fileTime:
                    type: string
                  message:
                    type: string
                  error:
                    type: string

  # ═══════════════════════════════════════════════════════════════════════
  #  VENDORS (거래처 관리)
  # ═══════════════════════════════════════════════════════════════════════

  /api/vendors:
    get:
      tags: [Vendors]
      summary: 거래처 목록 조회 (이름 순 정렬)
      operationId: getVendors
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 거래처 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vendor'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Vendors]
      summary: 거래처 등록
      operationId: postVendors
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                vendor_code:
                  type: string
                name:
                  type: string
                type:
                  type: string
                  description: "원재료/후공정/기타"
                contact:
                  type: string
                  description: "담당자명"
                phone:
                  type: string
                email:
                  type: string
                  format: email
                email_cc:
                  type: string
                  description: "참조 이메일 (쉼표 구분)"
                kakao:
                  type: string
                memo:
                  type: string
      responses:
        '200':
          description: 등록된 거래처 ID
          content:
            application/json:
              schema:
