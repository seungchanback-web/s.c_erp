                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Products]
      summary: 품목 등록
      operationId: postProducts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_code]
              properties:
                product_code:
                  type: string
                product_name:
                  type: string
                brand:
                  type: string
                origin:
                  type: string
