const PAGE_SIZE = 50;
let currentPage = 1;
let searchTerm = '';
let filterCate = '';
let filterStock = '';
let sortField = 'card_seq_desc';

function fmt(n) {
  if (n == null || n === 0) return '-';
  return n.toLocaleString('ko-KR');
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getFiltered() {
  let d = DATA.products;
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    d = d.filter(p => p.erp_code.toLowerCase().includes(q) ||
      p.card_code.toLowerCase().includes(q) ||
      (p.card_name||'').toLowerCase().includes(q));
  }
  if (filterCate) d = d.filter(p => p.card_cate === filterCate);
  if (filterStock === 'has') d = d.filter(p => p.shop_jaego > 0);
  if (filterStock === 'no') d = d.filter(p => p.shop_jaego === 0);

  // sort
  const [field, dir] = sortField.split('_');
  const dirMul = dir === 'desc' ? -1 : 1;
  if (field === 'card' && sortField.includes('seq')) {
    d.sort((a,b) => (b.card_seq - a.card_seq));
  } else if (sortField === 'shop_jaego_desc') {
    d.sort((a,b) => b.shop_jaego - a.shop_jaego);
  } else if (sortField === 'shop_jaego_asc') {
    d.sort((a,b) => a.shop_jaego - b.shop_jaego);
  } else if (sortField === 'card_price_desc') {
    d.sort((a,b) => b.card_price - a.card_price);
  } else if (sortField === 'card_price_asc') {
    d.sort((a,b) => a.card_price - b.card_price);
  } else if (sortField === 'erp_code_asc') {
    d.sort((a,b) => a.erp_code.localeCompare(b.erp_code));
  }
  return d;
}

function renderSummary(filtered) {
  const cards = document.getElementById('summaryCards');
  const totalShop = filtered.reduce((a,p) => a + p.shop_jaego, 0);
  const hasStock = filtered.filter(p => p.shop_jaego > 0).length;
  const noStock = filtered.filter(p => p.shop_jaego === 0).length;
  const avgPrice = filtered.length ? Math.round(filtered.reduce((a,p) => a + p.card_price, 0) / filtered.length) : 0;
  cards.innerHTML = `
    <div class="card"><div class="label">총 제품수</div><div class="value">${filtered.length}<span class="unit">개</span></div></div>
    <div class="card"><div class="label">쇼핑몰 총재고</div><div class="value">${fmt(totalShop)}<span class="unit">개</span></div></div>
    <div class="card"><div class="label">재고 보유</div><div class="value">${hasStock}<span class="unit">개 제품</span></div></div>
    <div class="card"><div class="label">재고 없음</div><div class="value">${noStock}<span class="unit">개 제품</span></div></div>
    <div class="card"><div class="label">평균 판매가</div><div class="value">${fmt(avgPrice)}<span class="unit">원</span></div></div>
  `;
}

      <td>${p.ishave === '1' ? '보유' : '미보유'}</td>
    </tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;

  document.getElementById('infoBar').innerHTML =
    `<span>총 ${filtered.length}건 중 ${start+1}-${Math.min(start+PAGE_SIZE, filtered.length)}건 표시</span>
     <span>조회일: ${DATA.generated}</span>`;
}

function renderPagination(filtered) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  const maxShow = 10;
  let s = Math.max(1, currentPage - Math.floor(maxShow/2));
  let e = Math.min(totalPages, s + maxShow - 1);
  if (e - s < maxShow - 1) s = Math.max(1, e - maxShow + 1);

  if (s > 1) html += `<button data-page="1">1</button><button disabled>...</button>`;
  for (let i = s; i <= e; i++) {
    html += `<button data-page="${i}" class="${i===currentPage?'active':''}">${i}</button>`;
  }
  if (e < totalPages) html += `<button disabled>...</button><button data-page="${totalPages}">${totalPages}</button>`;
  pag.innerHTML = html;
  pag.querySelectorAll('button[data-page]').forEach(btn => {
    btn.addEventListener('click', () => { currentPage = +btn.dataset.page; refresh(); });
  });
}

function refresh() {
  const filtered = getFiltered();
  renderSummary(filtered);
  renderTable(filtered);
  renderPagination(filtered);
}

// Init category filter
const cates = [...new Set(DATA.products.map(p => p.card_cate))].filter(Boolean).sort();
const cateSel = document.getElementById('filterCate');
cates.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c;
  const cateMap = {WI:'청첩장',SN:'시즌카드',EN:'봉투',AC:'부속',BB:'돌잔치',GR:'감사장',FS:'식권',EV:'이벤트',FP:'인쇄물',PH:'포토',ST:'스티커',PA:'보관함'};
  opt.textContent = `${cateMap[c]||c} (${DATA.products.filter(p=>p.card_cate===c).length})`;
  cateSel.appendChild(opt);
});

document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; currentPage = 1; refresh(); });
document.getElementById('filterCate').addEventListener('change', e => { filterCate = e.target.value; currentPage = 1; refresh(); });
document.getElementById('filterStock').addEventListener('change', e => { filterStock = e.target.value; currentPage = 1; refresh(); });
document.getElementById('sortField').addEventListener('change', e => { sortField = e.target.value; currentPage = 1; refresh(); });
document.getElementById('dateTag').textContent = `조회일: ${DATA.generated}`;

refresh();
</script>
