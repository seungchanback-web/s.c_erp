function buildBrandChips() {
    const brands = {};
    allProducts.forEach(p => {
        brands[p.brand] = (brands[p.brand] || 0) + 1;
    });
    const sorted = Object.entries(brands).sort((a,b) => b[1] - a[1]);
    const container = document.getElementById('brandChips');
    // 전체 chip
    const allChip = document.createElement('span');
    allChip.className = 'chip active';
    allChip.textContent = `전체 (${allProducts.length})`;
    allChip.onclick = () => {
        activeBrands.clear();
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        allChip.classList.add('active');
        renderTable();
    };
    container.appendChild(allChip);

    sorted.slice(0, 12).forEach(([brand, cnt]) => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = `${brand} (${cnt})`;
        chip.dataset.brand = brand;
        chip.onclick = () => {
            if (activeBrands.has(brand)) {
                activeBrands.delete(brand);
                chip.classList.remove('active');
            } else {
                activeBrands.add(brand);
                chip.classList.add('active');
            }
            allChip.classList.toggle('active', activeBrands.size === 0);
            renderTable();
        };
        container.appendChild(chip);
    });
}

function renderSummary(s) {
    document.getElementById('summaryBar').innerHTML = `
        <div class="summary-item"><span class="label">품목:</span><span class="value">${s.product_count.toLocaleString()}개</span></div>
        <div class="summary-item"><span class="label">bar_shop1 매칭:</span><span class="value">${s.matched_count}개</span></div>
        <div class="summary-item"><span class="label">현재고:</span><span class="value">${s.total_cur_stock.toLocaleString()}</span></div>
        <div class="summary-item"><span class="label">중국재고:</span><span class="value">${s.total_cn_stock.toLocaleString()}</span></div>
        <div class="summary-item"><span class="label">이동재고:</span><span class="value">${s.total_transit_stock.toLocaleString()}</span></div>
        <div class="summary-item"><span class="label">매출량:</span><span class="value">${s.total_sales.toLocaleString()}</span></div>
        <div class="summary-item"><span class="label">요청량:</span><span class="value">${s.total_req.toLocaleString()}</span></div>
    `;
}

function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const availF = document.getElementById('availFilter').value;
    const salesF = document.getElementById('salesFilter').value;

    let filtered = allProducts.filter(p => {
        if (activeBrands.size > 0 && !activeBrands.has(p.brand)) return false;
        if (search && !p.item_code.toLowerCase().includes(search)) return false;
        if (availF === 'neg' && p.avail_stock >= 0) return false;
        if (availF === 'zero' && p.avail_stock !== 0) return false;
        if (availF === 'low' && (p.avail_stock < 1 || p.avail_stock > 100)) return false;
        if (availF === 'pos' && p.avail_stock <= 0) return false;
        if (salesF === 'has' && p.sales_qty === 0) return false;
        if (salesF === 'none' && p.sales_qty > 0) return false;
        return true;
    });

    // 정렬
    const colMap = {
        ic: 'item_code', brand: 'brand', cate: 'cate_name', status: 'status',
        src_price: 'src_price', price: 'card_price', shop_jaego: 'shop_jaego',
        sales: 'sales_qty', cur: 'cur_stock', req: 'req_qty',
        avail: 'avail_stock', cn: 'cn_stock', transit: 'transit_stock'
    };
    const key = colMap[sortCol] || sortCol;

    filtered.sort((a, b) => {
        let va = a[key], vb = b[key];
        if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb||'').toLowerCase(); }
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
    });

    const tbody = document.getElementById('tableBody');

    // Virtual rendering for performance (show max 500)
    const MAX = 500;
    const shown = filtered.slice(0, MAX);

    tbody.innerHTML = shown.map(p => `
        <tr>
            <td><b>${esc(p.item_code)}</b></td>
            <td><span class="brand-tag ${brandClass(p.brand)}">${esc(p.brand)}</span></td>
            <td>${esc(p.cate_name)}</td>
            <td>${esc(p.status)}</td>
            <td class="num">${fmtN(p.src_price)}</td>
            <td class="num">${fmtN(p.card_price)}</td>
            <td class="num">${fmtN(p.shop_jaego)}</td>
            <td class="num" style="font-weight:bold;color:#2c5f2d">${fmtN(p.sales_qty)}</td>
            <td class="num ${p.cur_stock < 0 ? 'neg' : ''}">${fmtN(p.cur_stock)}</td>
            <td class="num">${fmtN(p.req_qty)}</td>
            <td class="num ${p.avail_stock < 0 ? 'neg' : ''}" style="font-weight:bold">${fmtN(p.avail_stock)}</td>
            <td class="num" style="color:#8b6914">${fmtN(p.cn_stock)}</td>
            <td class="num" style="color:#6a1b9a">${fmtN(p.transit_stock)}</td>
        </tr>
    `).join('');

    const countText = filtered.length > MAX
        ? `${MAX} / ${filtered.length} Items (상위 ${MAX}개 표시)`
        : `${filtered.length} / ${allProducts.length} Items`;
    document.getElementById('itemCount').textContent = countText;

    // 헤더 정렬 표시
    document.querySelectorAll('th[data-col]').forEach(th => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (th.dataset.col === sortCol) {
            th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
        }
    });
}

function brandClass(b) {
    const map = {'바른손카드':'bt-bc','비헨즈':'bt-bh','초대장':'bt-bi','바른손':'bt-bs',
        '프리미어':'bt-pe','더카드':'bt-dd','식권':'bt-fs','봉투':'bt-be','TG':'bt-tg'};
    return map[b] || 'bt-etc';
}

function fmtN(n) {
    if (n === 0 || n === null || n === undefined) return '<span class="zero">0</span>';
    return n.toLocaleString();
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 헤더 클릭 정렬
document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = col; sortDir = 'desc'; }
        renderTable();
    });
});

// 필터 실시간
document.getElementById('searchInput').addEventListener('input', renderTable);
document.getElementById('availFilter').addEventListener('change', renderTable);
document.getElementById('salesFilter').addEventListener('change', renderTable);

// CSV 내보내기
function exportCSV() {
    if (!allProducts.length) return alert('데이터가 없습니다');
    const headers = ['품목코드','브랜드','카드구분','상태','마감단가','ERP소가','Shop재고','매출량','현재고','요청량','가용재고','중국재고','이동재고'];
    const keys = ['item_code','brand','cate_name','status','src_price','card_price','shop_jaego','sales_qty','cur_stock','req_qty','avail_stock','cn_stock','transit_stock'];
    const bom = '\uFEFF';
    let csv = bom + headers.join(',') + '\n';
    allProducts.forEach(p => {
        csv += keys.map(k => {
            let v = p[k];
            if (typeof v === 'string') return '"' + v.replace(/"/g, '""') + '"';
            return v;
        }).join(',') + '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `스마트재고현황_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
}
